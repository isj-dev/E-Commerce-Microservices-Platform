spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowedHeaders: "*"
                allowCredentials: false
                maxAge: 3600
          routes:
            # ── API docs 프록시 ─────────────────────────────────────────
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /service-docs/user-service
              filters:
                - name: RewritePath
                  args:
                    regexp: /service-docs/user-service
                    replacement: /v3/api-docs

            - id: product-service-docs
              uri: lb://product-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /service-docs/product-service
              filters:
                - name: RewritePath
                  args:
                    regexp: /service-docs/product-service
                    replacement: /v3/api-docs

            - id: order-service-docs
              uri: lb://order-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /service-docs/order-service
              filters:
                - name: RewritePath
                  args:
                    regexp: /service-docs/order-service
                    replacement: /v3/api-docs

            - id: payment-service-docs
              uri: lb://payment-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /service-docs/payment-service
              filters:
                - name: RewritePath
                  args:
                    regexp: /service-docs/payment-service
                    replacement: /v3/api-docs

            - id: cart-service-docs
              uri: lb://cart-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /service-docs/cart-service
              filters:
                - name: RewritePath
                  args:
                    regexp: /service-docs/cart-service
                    replacement: /v3/api-docs

            # ── 비즈니스 라우트 ─────────────────────────────────────────
            - id: user-service
              uri: lb://user-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /api/v1/users/**
                    _genkey_1: /api/v1/auth/**
              filters:
                - name: RewritePath
                  args:
                    regexp: /api/v1/(?<segment>.*)
                    replacement: /${segment}

            - id: user-service-authenticated
              uri: lb://user-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /api/v1/me/**
              filters:
                - name: RewritePath
                  args:
                    regexp: /api/v1/(?<segment>.*)
                    replacement: /${segment}
                - name: JwtAuthenticationFilter

            - id: product-service
              uri: lb://product-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /api/v1/products/**
              filters:
                - name: RewritePath
                  args:
                    regexp: /api/v1/(?<segment>.*)
                    replacement: /${segment}

            - id: order-service
              uri: lb://order-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /api/v1/orders/**
              filters:
                - name: RewritePath
                  args:
                    regexp: /api/v1/(?<segment>.*)
                    replacement: /${segment}
                - name: JwtAuthenticationFilter

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /api/v1/payments/**
              filters:
                - name: RewritePath
                  args:
                    regexp: /api/v1/(?<segment>.*)
                    replacement: /${segment}
                - name: JwtAuthenticationFilter

            - id: cart-service
              uri: lb://cart-service
              predicates:
                - name: Path
                  args:
                    _genkey_0: /api/v1/cart/**
              filters:
                - name: RewritePath
                  args:
                    regexp: /api/v1/(?<segment>.*)
                    replacement: /${segment}
                - name: JwtAuthenticationFilter

server:
  port: 9000

app:
  gateway-url: http://localhost:9000/api/v1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: user-service
        url: /service-docs/user-service
      - name: product-service
        url: /service-docs/product-service
      - name: order-service
        url: /service-docs/order-service
      - name: payment-service
        url: /service-docs/payment-service
      - name: cart-service
        url: /service-docs/cart-service
  api-docs:
    enabled: true

jwt:
  secret: ecommerce-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    org.springframework.cloud.gateway: INFO
