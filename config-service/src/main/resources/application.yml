spring:
  application:
    name: config-service
  cloud:
    compatibility-verifier:
      enabled: false
    config:
      server:
        native:
          search-locations: classpath:/configs # 해당 디렉터리 파일 서빙
  profiles:
    active: native # 파일 시스템 모드 설정 (git이 아닌 로컬파일에서 설정 읽음)

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,prometheus
