spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/userdb
    username: ecommerce
    password: ecommerce123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true # sql 로그
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG # sql 로그 LEVEL
    org.hibernate.orm.jdbc.bind: TRACE

jwt:
  secret: ecommerce-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256
  expiration: 86400000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
